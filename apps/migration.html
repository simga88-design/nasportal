<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Data Migration (Local to GAS)</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/config.js"></script>
    <style>
        body {
            padding: 40px;
            background: #f9fafb;
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-bottom: 20px;
            color: #111827;
        }

        p {
            color: #4b5563;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .step {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        .step h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #374151;
        }

        .status {
            font-weight: bold;
            margin-left: 10px;
        }

        .status.pending {
            color: #9ca3af;
        }

        .status.success {
            color: #10b981;
        }

        .status.error {
            color: #ef4444;
        }

        .status.running {
            color: #3b82f6;
        }

        .log-box {
            background: #1f2937;
            color: #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 200px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 데이터 마이그레이션 도구</h1>
        <p>
            로컬에 저장된 JSON 데이터(`db/*.json`, `data/*.json`)를 읽어 Google Sheets(GAS)로 업로드합니다.<br>
            이 작업은 <strong>일회성</strong> 작업입니다. 데이터 중복을 방지하기 위해 <strong>시트가 비어있는 상태에서 한 번만 실행</strong>하세요.
        </p>

        <div
            style="text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div style="display: flex; gap: 20px; margin-bottom: 10px;">
                <label><input type="checkbox" id="chk-members" checked> 직원/부서</label>
                <label><input type="checkbox" id="chk-notices" checked> 공지사항</label>
                <label><input type="checkbox" id="chk-calendar" checked> 일정</label>
            </div>
            <button id="btn-start" onclick="startMigration()">🚀 선택한 항목 마이그레이션 시작</button>
        </div>

        <div class="step">
            <h3>진행 로그</h3>
            <div id="console-log" class="log-box"></div>
        </div>
    </div>

    <!-- fs 모듈 사용을 위해 Electron 환경 필요 -->
    <script>
        const fs = require('fs');
        const path = require('path');

        // Path Setup (assuming running from apps/migration.html)
        const DB_DIR = path.join(__dirname, '../db');
        const DATA_DIR = path.join(__dirname, '../data');

        function log(msg) {
            const pre = document.getElementById('console-log');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.innerText = `[${time}] ${msg}`;
            pre.appendChild(div);
            pre.scrollTop = pre.scrollHeight;
        }

        async function startMigration() {
            const doMembers = document.getElementById('chk-members').checked;
            const doNotices = document.getElementById('chk-notices').checked;
            const doCalendar = document.getElementById('chk-calendar').checked;

            if (!doMembers && !doNotices && !doCalendar) {
                alert('하나 이상의 항목을 선택해주세요.');
                return;
            }

            if (!confirm('경고: 마이그레이션을 시작하면 데이터를 GAS로 전송합니다.\n기존에 시트에 데이터가 있다면 중복될 수 있습니다.\n계속하시겠습니까?')) return;

            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-start').innerText = "진행 중...";

            try {
                // 1. Members
                if (doMembers) {
                    await processFile(path.join(DB_DIR, 'members.json'), 'save_member', '직원');
                    await processFile(path.join(DB_DIR, 'teams.json'), 'save_team', '부서');
                } else {
                    log('⏭️ [직원/부서] 건너뜀');
                }

                // 2. Notices
                if (doNotices) {
                    await processFile(path.join(DB_DIR, 'notices.json'), 'save_notice', '공지사항');
                } else {
                    log('⏭️ [공지사항] 건너뜀');
                }

                // 3. Calendar
                if (doCalendar) {
                    await processFile(path.join(DATA_DIR, 'calendar.json'), 'save_event', '일정');
                } else {
                    log('⏭️ [일정] 건너뜀');
                }

                alert('작업이 완료되었습니다.');
                log('🎉 선택된 작업 완료!');
            } catch (e) {
                console.error(e);
                alert('오류 발생: ' + e.message);
                log('❌ 치명적 오류: ' + e.message);
            } finally {
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').innerText = "재시도 (권장하지 않음)";
            }
        }

        async function processFile(filePath, action, label) {
            log(`>>> [${label}] 파일 읽기 시도: ${filePath}`);

            if (!fs.existsSync(filePath)) {
                log(`⚠️ [${label}] 파일이 없습니다. 건너뜁니다.`);
                return;
            }

            try {
                const content = fs.readFileSync(filePath, 'utf-8');
                if (!content.trim()) {
                    log(`⚠️ [${label}] 파일이 비어있습니다.`);
                    return;
                }

                const data = JSON.parse(content);
                log(`ℹ️ [${label}] ${data.length}개의 항목 발견. 업로드 시작...`);

                let successCount = 0;
                let failCount = 0;

                for (const item of data) {
                    try {
                        const payload = { ...item, action: action };
                        const res = await fetch(BASE_URL, {
                            method: 'POST',
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify(payload)
                        });
                        const json = await res.json();

                        if (json.result === 'success') {
                            successCount++;
                            if (successCount % 5 === 0) log(`... ${successCount}개 저장 완료`);
                        } else {
                            failCount++;
                            log(`❌ [${label}] 저장 실패: ${json.message}`);
                        }
                    } catch (reqErr) {
                        failCount++;
                        log(`❌ [${label}] 통신/요류: ${reqErr.message}`);
                    }
                }
                log(`✅ [${label}] 완료: 성공 ${successCount}건, 실패 ${failCount}건`);

            } catch (fileErr) {
                log(`❌ [${label}] 파일 처리 중 오류: ${fileErr.message}`);
            }
        }
    </script>
</body>

</html>
