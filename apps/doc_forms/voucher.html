<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음투자 의뢰서 입력 폼</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --border: #e2e8f0;
            --text: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-size: 14px;
            background: transparent;
        }

        .form-group {
            margin-bottom: 8px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>

<body>
    <div id="form-content" style="padding: 15px 20px 30px;">
        <div class="form-group">
            <label class="form-label">대상자 이름</label>
            <input type="text" id="v_name" class="form-control" placeholder="홍길동">
        </div>
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex:1;">
                <label class="form-label">생년월일 (6자리)</label>
                <input type="text" id="v_birth" class="form-control" placeholder="예: 900101">
            </div>
            <div style="flex:1;">
                <label class="form-label">성별</label>
                <select id="v_gender" class="form-control">
                    <option value="남성">남성</option>
                    <option value="여성">여성</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">연락처</label>
            <input type="text" id="v_contact" class="form-control" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
            <label class="form-label">주소</label>
            <input type="text" id="v_address" class="form-control" placeholder="제천시...">
        </div>
        <div class="form-group">
            <label class="form-label">주호소 문제</label>
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 5px; font-size:13px;">
                <label style="cursor:pointer;"><input type="checkbox" name="v_mainIssue" value="우울"> 우울</label>
                <label style="cursor:pointer;"><input type="checkbox" name="v_mainIssue" value="불안"> 불안</label>
                <label style="cursor:pointer;"><input type="checkbox" name="v_mainIssue" value="기타"
                        id="v_mainIssue_other_chk"> 기타</label>
            </div>
            <input type="text" id="v_mainIssue_other" class="form-control" placeholder="기타 내용">
        </div>
        <div class="form-group" style="display: flex; gap: 10px; align-items: center;">
            <div style="flex:1;">
                <label class="form-label" style="cursor:pointer;"><input type="checkbox" id="v_chk_phq9"> PHQ-9</label>
                <input type="text" id="v_score_phq9" class="form-control" placeholder="점수">
            </div>
            <div style="flex:1;">
                <label class="form-label" style="cursor:pointer;"><input type="checkbox" id="v_chk_gad7"> GAD-7</label>
                <input type="text" id="v_score_gad7" class="form-control" placeholder="점수">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">약물치료 여부</label>
            <select id="v_medication" class="form-control">
                <option value="없음">없음</option>
                <option value="있음">있음</option>
            </select>
        </div>
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                <label class="form-label" style="margin: 0;">의뢰 내용</label>
                <button type="button" onclick="autoGenerateContent()"
                    style="font-size: 11px; padding: 4px 8px; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; background: #f8fafc; color: #2563eb; font-weight:bold;">
                    내용 자동 작성</button>
            </div>
            <textarea id="v_content" class="form-control" placeholder="자동 작성 텍스트가 입력됩니다." rows="5"></textarea>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        const API_URL = `${(typeof window !== 'undefined' ? window.location.origin : 'http://localhost')}/api/auth`;

        function autoGenerateContent() {
            const phqChk = document.getElementById('v_chk_phq9').checked;
            const phqS = document.getElementById('v_score_phq9').value;
            const gadChk = document.getElementById('v_chk_gad7').checked;
            const gadS = document.getElementById('v_score_gad7').value;

            const phq = phqChk ? `PHQ-9 ${phqS}점` : '';
            const gad = gadChk ? `GAD-7 ${gadS}점` : '';

            const checks = Array.from(document.querySelectorAll('input[name="v_mainIssue"]:checked')).map(el => el.value);
            const issues = checks.filter(v => v !== '기타');
            const hasOther = document.getElementById('v_mainIssue_other_chk').checked;
            const otherText = document.getElementById('v_mainIssue_other').value;

            if (hasOther && otherText) issues.push(`기타(${otherText})`);

            let text = `상기 의뢰고객은 본 센터에서 ${issues.join(', ') || '상담'} 문제로 면담을 진행하였으며 `;
            const tests = [phq, gad].filter(x => x).join(', ');
            text += tests;
            text += (phq || gad) ? ' 확인함. ' : '';
            text += '이에 심리상담이 필요한 것으로 판단되어 의뢰서를 발급함.';

            document.getElementById('v_content').value = text;
            updatePreview();
        }

        function updatePreview() {
            const issues = Array.from(document.querySelectorAll('input[name="v_mainIssue"]:checked')).map(el => el.value);
            const data = {
                v_name: document.getElementById('v_name').value,
                v_birth: document.getElementById('v_birth').value,
                v_gender: document.getElementById('v_gender').value,
                v_contact: document.getElementById('v_contact').value,
                v_address: document.getElementById('v_address').value,
                v_mainIssue: issues,
                v_mainIssue_other: document.getElementById('v_mainIssue_other').value,
                v_chk_phq9: document.getElementById('v_chk_phq9').checked,
                v_score_phq9: document.getElementById('v_score_phq9').value,
                v_chk_gad7: document.getElementById('v_chk_gad7').checked,
                v_score_gad7: document.getElementById('v_score_gad7').value,
                v_medication: document.getElementById('v_medication').value,
                v_content: document.getElementById('v_content').value
            };
            window.parent.postMessage({ type: 'updatePreview', payload: data }, '*');
        }

        document.querySelectorAll('input, select, textarea').forEach(el => {
            ['input', 'change'].forEach(evt => {
                el.addEventListener(evt, () => {
                    if (window.updateTimeout) clearTimeout(window.updateTimeout);
                    window.updateTimeout = setTimeout(updatePreview, 100);
                });
            });
        });

        setTimeout(updatePreview, 100);

        window.addEventListener('message', function (event) {
            if (event.data.action === 'save') {
                saveData(event.data.commonData);
            } else if (event.data.action === 'updateCommon') {
                updatePreview();
            } else if (event.data.action === 'unlockInputs') {
                document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = false);
                document.querySelectorAll('button').forEach(el => el.style.display = '');
            } else if (event.data.action === 'loadDoc') {
                const doc = event.data.data;
                const content = doc.content || {};

                document.getElementById('v_name').value = content.v_name || '';
                document.getElementById('v_birth').value = content.v_birth || '';
                document.getElementById('v_gender').value = content.v_gender || '남성';
                document.getElementById('v_contact').value = content.v_contact || '';
                document.getElementById('v_address').value = content.v_address || '';

                const issues = content.v_mainIssue || [];
                document.querySelectorAll('input[name="v_mainIssue"]').forEach(el => {
                    el.checked = issues.includes(el.value);
                });

                const isOther = issues.some(i => i.startsWith('기타'));
                document.getElementById('v_mainIssue_other_chk').checked = isOther;
                document.getElementById('v_mainIssue_other').value = content.v_mainIssue_other || '';

                document.getElementById('v_chk_phq9').checked = !!content.v_chk_phq9;
                document.getElementById('v_score_phq9').value = content.v_score_phq9 || '';
                document.getElementById('v_chk_gad7').checked = !!content.v_chk_gad7;
                document.getElementById('v_score_gad7').value = content.v_score_gad7 || '';

                document.getElementById('v_medication').value = content.v_medication || '없음';
                document.getElementById('v_content').value = content.v_content || '';

                // Lock fields in view mode
                document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
                document.querySelectorAll('button').forEach(el => el.style.display = 'none');

                updatePreview();
            }
        });

        function saveData(commonData) {
            const issues = Array.from(document.querySelectorAll('input[name="v_mainIssue"]:checked')).map(el => el.value);
            const content = {
                v_name: document.getElementById('v_name').value,
                v_birth: document.getElementById('v_birth').value,
                v_gender: document.getElementById('v_gender').value,
                v_contact: document.getElementById('v_contact').value,
                v_address: document.getElementById('v_address').value,
                v_mainIssue: issues,
                v_mainIssue_other: document.getElementById('v_mainIssue_other').value,
                v_chk_phq9: document.getElementById('v_chk_phq9').checked,
                v_score_phq9: document.getElementById('v_score_phq9').value,
                v_chk_gad7: document.getElementById('v_chk_gad7').checked,
                v_score_gad7: document.getElementById('v_score_gad7').value,
                v_medication: document.getElementById('v_medication').value,
                v_content: document.getElementById('v_content').value
            };

            const target_name = content.v_name;
            if (!target_name) {
                Toastify({ text: "대상자 이름을 입력해주세요.", style: { background: "#ef4444" }, duration: 3000 }).showToast();
                window.parent.postMessage({ type: 'saveError' }, '*');
                return;
            }

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'save_issued_doc',
                    type: 'voucher',
                    target_name,
                    content: { ...commonData, ...content },
                    issuer: commonData.issuer
                })
            })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        window.parent.postMessage({ type: 'saveSuccess', id: json.id }, '*');
                    } else {
                        Toastify({ text: "오류 발생: " + json.message, style: { background: "#ef4444" }, duration: 4000 }).showToast();
                        window.parent.postMessage({ type: 'saveError' }, '*');
                    }
                })
                .catch(err => {
                    Toastify({ text: "서버 통신 오류", style: { background: "#ef4444" }, duration: 4000 }).showToast();
                    window.parent.postMessage({ type: 'saveError' }, '*');
                });
        }
    </script>
</body>

</html>
