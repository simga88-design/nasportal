<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강사비 산출내역서 입력 폼</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --border: #e2e8f0;
            --text: #334155;
            --background: #f8fafc;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-size: 14px;
            background: transparent;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 60px;
        }

        .calc-col {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .calc-col-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="form-content" style="padding: 15px 20px 30px;">
        <div class="form-group">
            <label class="form-label">건 명</label>
            <input type="text" id="v_title" class="form-control" placeholder="예: 2024년 노인우울... 프로그램">
        </div>
        <div class="form-group">
            <label class="form-label">일 시</label>
            <input type="text" id="v_datetime" class="form-control" placeholder="예: 2024. 3. 13.~">
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label class="form-label" style="margin:0;">산출 내역 (최대 5개)</label>
                <button type="button" class="btn-sm" onclick="addColumn()"><i class="fas fa-plus"></i> 칸 추가</button>
            </div>

            <div id="calc-container">
                <!-- Columns will be injected here -->
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">총 강사비</label>
            <input type="text" id="v_total" class="form-control" placeholder="금000원(금00원)">
        </div>

        <div class="form-group" style="display: flex; gap:10px;">
            <div style="flex:1;">
                <label class="form-label">확인 일자</label>
                <input type="text" id="v_date" class="form-control" placeholder="예: 2024. 4. 16.">
            </div>
            <div style="flex:1;">
                <label class="form-label">확인자</label>
                <input type="text" id="v_reviewer" class="form-control" placeholder="직급/성명">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        const API_URL = `${(typeof window !== 'undefined' ? window.location.origin : 'http://localhost')}/api/auth`;

        let cols = [
            { id: 1, date: '', count: '1회', participants: '', detail: '', remark: '*증빙자료: 참여자명단사본' }
        ];

        function renderColumns() {
            const container = document.getElementById('calc-container');
            container.innerHTML = '';
            cols.forEach((col, index) => {
                const html = `
                    <div class="calc-col">
                        <div class="calc-col-title">
                            <span>내역 #${index + 1}</span>
                            ${cols.length > 1 ? `<button type="button" class="btn-sm" onclick="removeColumn(${col.id})"><i class="fas fa-times" style="color:red;"></i></button>` : ''}
                        </div>
                        <div style="display:flex; gap:5px; margin-bottom:5px;">
                            <input type="text" class="form-control col-date" data-id="${col.id}" value="${col.date}" placeholder="날짜 (예: 3월 13일)">
                            <input type="text" class="form-control col-count" data-id="${col.id}" value="1회" style="width:50px; text-align:center; background-color:#f1f5f9; color:#94a3b8;" readonly>
                        </div>
                        <div style="margin-bottom:5px;">
                            <input type="text" class="form-control col-participants" data-id="${col.id}" value="${col.participants}" placeholder="참여자수 (예: 7명)">
                        </div>
                        <div style="margin-bottom:5px;">
                            <textarea class="form-control col-detail" data-id="${col.id}" placeholder="산출내역">${col.detail}</textarea>
                        </div>
                        <div>
                            <input type="text" class="form-control col-remark" data-id="${col.id}" value="${col.remark}" placeholder="비고">
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            // Attach event listeners to newly rendered inputs
            container.querySelectorAll('input, textarea').forEach(el => {
                el.addEventListener('input', () => {
                    const id = parseInt(el.getAttribute('data-id'));
                    const col = cols.find(c => c.id === id);
                    if (el.classList.contains('col-date')) col.date = el.value;
                    if (el.classList.contains('col-count')) col.count = el.value;
                    if (el.classList.contains('col-participants')) col.participants = el.value;
                    if (el.classList.contains('col-detail')) col.detail = el.value;
                    if (el.classList.contains('col-remark')) col.remark = el.value;

                    triggerPreview();
                });
            });

            triggerPreview();
        }

        function addColumn() {
            if (cols.length >= 5) {
                alert('최대 5개까지만 추가할 수 있습니다.');
                return;
            }
            cols.push({
                id: Date.now(),
                date: '',
                count: '1회',
                participants: '',
                detail: '',
                remark: ''
            });
            renderColumns();
        }

        function removeColumn(id) {
            cols = cols.filter(c => c.id !== id);
            renderColumns();
        }

        function getPayload() {
            return {
                v_title: document.getElementById('v_title').value,
                v_datetime: document.getElementById('v_datetime').value,
                v_total: document.getElementById('v_total').value,
                v_date: document.getElementById('v_date').value,
                v_reviewer: document.getElementById('v_reviewer').value,
                v_cols: cols
            };
        }

        function triggerPreview() {
            if (window.updateTimeout) clearTimeout(window.updateTimeout);
            window.updateTimeout = setTimeout(() => {
                window.parent.postMessage({ type: 'updatePreview', payload: getPayload() }, '*');
            }, 100);
        }

        document.querySelectorAll('input:not(.col-date, .col-count, .col-participants, .col-detail, .col-remark)').forEach(el => {
            el.addEventListener('input', triggerPreview);
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderColumns();
        });

        window.addEventListener('message', function (event) {
            if (event.data.action === 'save') {
                saveData(event.data.commonData);
            } else if (event.data.action === 'updateCommon') {
                const cm = event.data.commonData;
                if (cm.issueDate && !document.getElementById('v_date').value) {
                    // pre-fill date
                    const d = new Date(cm.issueDate);
                    document.getElementById('v_date').value = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
                }
                if (cm.issuer && !document.getElementById('v_reviewer').value) {
                    document.getElementById('v_reviewer').value = `제천시정신건강복지센터 사회복지사 ${cm.issuer}`;
                }
                triggerPreview();
            } else if (event.data.action === 'unlockInputs') {
                document.querySelectorAll('input, select, textarea, button').forEach(el => el.disabled = false);
            } else if (event.data.action === 'loadDoc') {
                const doc = event.data.data;
                const content = doc.content || {};

                document.getElementById('v_title').value = content.v_title || '';
                document.getElementById('v_datetime').value = content.v_datetime || '';
                document.getElementById('v_total').value = content.v_total || '';
                document.getElementById('v_date').value = content.v_date || '';
                document.getElementById('v_reviewer').value = content.v_reviewer || '';

                if (content.v_cols && Array.isArray(content.v_cols)) {
                    cols = content.v_cols;
                }
                renderColumns();

                // Lock fields in view mode
                document.querySelectorAll('input, select, textarea, button').forEach(el => el.disabled = true);
                triggerPreview();
            }
        });

        function saveData(commonData) {
            const content = getPayload();
            const target_name = content.v_title;
            if (!target_name) {
                Toastify({ text: "건 명을 입력해주세요.", style: { background: "#ef4444" }, duration: 3000 }).showToast();
                window.parent.postMessage({ type: 'saveError' }, '*');
                return;
            }

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'save_issued_doc',
                    type: '강사비산출내역서',
                    target_name: target_name,
                    title: `강사비산출내역서(${target_name.substring(0, 10)}...)`,
                    content: { ...commonData, ...content },
                    issuer: commonData.issuer
                })
            })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        window.parent.postMessage({ type: 'saveSuccess', id: json.id }, '*');
                    } else {
                        Toastify({ text: "오류 발생: " + json.message, style: { background: "#ef4444" }, duration: 4000 }).showToast();
                        window.parent.postMessage({ type: 'saveError' }, '*');
                    }
                })
                .catch(err => {
                    Toastify({ text: "서버 오류", style: { background: "#ef4444" }, duration: 4000 }).showToast();
                    window.parent.postMessage({ type: 'saveError' }, '*');
                });
        }
    </script>
</body>

</html>
