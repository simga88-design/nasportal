<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의확인서 입력 폼</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --border: #e2e8f0;
            --text: #334155;
            --background: #f8fafc;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-size: 14px;
            background: transparent;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 50px;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="form-content" style="padding: 15px 20px 30px;">
        <div class="form-group">
            <label class="form-label">1. 사업명</label>
            <input type="text" id="v_biz" class="form-control" placeholder="예: 중증정신질환자 주간재활프로그램 “해바라기”">
        </div>
        <div class="form-group">
            <label class="form-label">2. 강의일시</label>
            <textarea id="v_datetime" class="form-control" placeholder="예: 2025. 5. 20. 10:00~11:00(1시간)"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">3. 강의장소</label>
            <input type="text" id="v_place" class="form-control" placeholder="예: 제천시정신건강복지센터 프로그램실">
        </div>
        <div class="form-group">
            <label class="form-label">4. 강의주제</label>
            <input type="text" id="v_topic" class="form-control" placeholder="예: 노래교실 프로그램">
        </div>
        <div class="form-group">
            <label class="form-label">5. 강사</label>
            <input type="text" id="v_teacher" class="form-control" placeholder="강사명">
        </div>

        <hr style="border:0; border-top:1px solid #e2e8f0; margin:20px 0;">

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label class="form-label" style="margin:0;">6. 활동내역 (최대 5개)</label>
                <button type="button" class="btn-sm" onclick="addAct()"><i class="fas fa-plus"></i> 내역 추가</button>
            </div>
            <div id="act-container">
                <!-- Dynamic acts will be injected here -->
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">7. 강사 종합소득세 신고</label>
            <div style="display:flex; gap:15px; font-size:13px;">
                <label style="cursor:pointer;"><input type="checkbox" id="v_tax_biz" checked> 사업소득</label>
                <label style="cursor:pointer;"><input type="checkbox" id="v_tax_etc"> 기타소득</label>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">확인 일자</label>
            <input type="text" id="v_date" class="form-control" placeholder="예: 2025. 5. 27.">
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label class="form-label">강사 서명</label>
                <input type="text" id="v_sign1" class="form-control" placeholder="강사명">
            </div>
            <div style="flex:1;">
                <label class="form-label">담당자 서명</label>
                <input type="text" id="v_sign2" class="form-control" placeholder="담당자명">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        const API_URL = `${(typeof window !== 'undefined' ? window.location.origin : 'http://localhost')}/api/auth`;

        let acts = [
            { id: 1, date: '', desc: '', fee: '' }
        ];

        function renderActs() {
            const container = document.getElementById('act-container');
            container.innerHTML = '';
            acts.forEach((act, index) => {
                const html = `
                    <div style="background:white; border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:10px; position:relative;">
                        <div style="font-size:12px; font-weight:bold; color:var(--primary); margin-bottom:10px; display:flex; justify-content:space-between;">
                            <span>내역 ${index + 1}</span>
                            ${acts.length > 1 ? `<button type="button" class="btn-sm" onclick="removeAct(${act.id})"><i class="fas fa-times" style="color:red;"></i></button>` : ''}
                        </div>
                        <input type="text" class="form-control act-date" data-id="${act.id}" value="${act.date}" placeholder="활동일자 (예: 2025. 5. 20. (10:00~11:00))" style="margin-bottom:5px;">
                        <input type="text" class="form-control act-desc" data-id="${act.id}" value="${act.desc}" placeholder="활동내역 (예: 노래교실 프로그램 진행)" style="margin-bottom:5px;">
                        <input type="text" class="form-control act-fee" data-id="${act.id}" value="${act.fee}" placeholder="강사비 (예: 80,000원)">
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            container.querySelectorAll('input').forEach(el => {
                el.addEventListener('input', () => {
                    const id = parseInt(el.getAttribute('data-id'));
                    const act = acts.find(a => a.id === id);
                    if (el.classList.contains('act-date')) act.date = el.value;
                    if (el.classList.contains('act-desc')) act.desc = el.value;
                    if (el.classList.contains('act-fee')) act.fee = el.value;
                    triggerPreview();
                });
            });
            triggerPreview();
        }

        function addAct() {
            if (acts.length >= 5) {
                alert('최대 5개까지만 추가할 수 있습니다.');
                return;
            }
            acts.push({ id: Date.now(), date: '', desc: '', fee: '' });
            renderActs();
        }

        function removeAct(id) {
            acts = acts.filter(a => a.id !== id);
            renderActs();
        }

        function getPayload() {
            return {
                v_biz: document.getElementById('v_biz').value,
                v_datetime: document.getElementById('v_datetime').value,
                v_place: document.getElementById('v_place').value,
                v_topic: document.getElementById('v_topic').value,
                v_teacher: document.getElementById('v_teacher').value,

                v_acts: acts,

                v_tax_biz: document.getElementById('v_tax_biz').checked,
                v_tax_etc: document.getElementById('v_tax_etc').checked,

                v_date: document.getElementById('v_date').value,
                v_sign1: document.getElementById('v_sign1').value,
                v_sign2: document.getElementById('v_sign2').value
            };
        }

        function triggerPreview() {
            if (window.updateTimeout) clearTimeout(window.updateTimeout);
            window.updateTimeout = setTimeout(() => {
                window.parent.postMessage({ type: 'updatePreview', payload: getPayload() }, '*');
            }, 100);
        }

        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', triggerPreview);
            el.addEventListener('change', triggerPreview);
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderActs();
        });

        window.addEventListener('message', function (event) {
            if (event.data.action === 'save') {
                saveData(event.data.commonData);
            } else if (event.data.action === 'updateCommon') {
                const cm = event.data.commonData;
                if (cm.issuer && !document.getElementById('v_sign2').value) {
                    document.getElementById('v_sign2').value = cm.issuer;
                }
                triggerPreview();
            } else if (event.data.action === 'unlockInputs') {
                document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = false);
            } else if (event.data.action === 'loadDoc') {
                const doc = event.data.data;
                const content = doc.content || {};

                document.getElementById('v_biz').value = content.v_biz || '';
                document.getElementById('v_datetime').value = content.v_datetime || '';
                document.getElementById('v_place').value = content.v_place || '';
                document.getElementById('v_topic').value = content.v_topic || '';
                document.getElementById('v_teacher').value = content.v_teacher || '';

                if (content.v_acts && Array.isArray(content.v_acts)) {
                    acts = content.v_acts;
                } else {
                    let oldActs = [];
                    if (content.v_act1_date || content.v_act1_desc || content.v_act1_fee) {
                        oldActs.push({ id: 1, date: content.v_act1_date || '', desc: content.v_act1_desc || '', fee: content.v_act1_fee || '' });
                    }
                    if (content.v_act2_date || content.v_act2_desc || content.v_act2_fee) {
                        oldActs.push({ id: 2, date: content.v_act2_date || '', desc: content.v_act2_desc || '', fee: content.v_act2_fee || '' });
                    }
                    if (oldActs.length > 0) acts = oldActs;
                }
                renderActs();

                document.getElementById('v_tax_biz').checked = !!content.v_tax_biz;
                document.getElementById('v_tax_etc').checked = !!content.v_tax_etc;

                document.getElementById('v_date').value = content.v_date || '';
                document.getElementById('v_sign1').value = content.v_sign1 || '';
                document.getElementById('v_sign2').value = content.v_sign2 || '';

                // Lock fields in view mode
                document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
                triggerPreview();
            }
        });

        function saveData(commonData) {
            const content = getPayload();
            const target_name = content.v_biz;
            if (!target_name) {
                Toastify({ text: "사업명을 입력해주세요.", style: { background: "#ef4444" }, duration: 3000 }).showToast();
                window.parent.postMessage({ type: 'saveError' }, '*');
                return;
            }

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'save_issued_doc',
                    type: '강의확인서',
                    target_name: target_name,
                    title: `강의확인서(${target_name.substring(0, 10)}...)`,
                    content: { ...commonData, ...content },
                    issuer: commonData.issuer
                })
            })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        window.parent.postMessage({ type: 'saveSuccess', id: json.id }, '*');
                    } else {
                        Toastify({ text: "오류 발생: " + json.message, style: { background: "#ef4444" }, duration: 4000 }).showToast();
                        window.parent.postMessage({ type: 'saveError' }, '*');
                    }
                })
                .catch(err => {
                    Toastify({ text: "서버 오류", style: { background: "#ef4444" }, duration: 4000 }).showToast();
                    window.parent.postMessage({ type: 'saveError' }, '*');
                });
        }
    </script>
</body>

</html>
