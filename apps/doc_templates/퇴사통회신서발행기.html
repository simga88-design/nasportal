<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퇴원사실통지서 회신서 미리보기</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            color: #333;
        }

        #printable-area {
            background: #fff;
            position: relative;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 40px;
            color: rgba(0, 0, 0, 0.04);
            font-weight: 800;
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 10px;
            z-index: 0;
        }

        .paper {
            padding: 1.8cm;
            font-size: 12pt;
            line-height: 1.6;
            box-sizing: border-box;
            color: #000;
            width: 21cm;
            height: 29.7cm;
            background: #fff;
            margin: 0 auto;
            transform-origin: top left;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: 1px solid #000;
        }

        .doc-table td {
            border: 1px solid #000;
            padding: 7px 10px;
            vertical-align: middle;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .doc-table .label {
            background: #f2f2f2;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
        }

        .result-cell {
            padding: 12px !important;
            vertical-align: top;
            height: 500px;
        }

        .result-text {
            padding-left: 20px;
            text-indent: -15px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .signature {
            margin-top: 15px;
            text-align: right;
        }

        .signature p {
            margin: 5px 0;
            font-size: 11pt;
        }

        .signature .chief {
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* Hide inputs in preview */
        input,
        select,
        textarea {
            display: none !important;
        }

        @media print {
            @page {
                margin: 0;
            }

            body * {
                visibility: hidden;
            }

            #printable-area,
            #printable-area * {
                visibility: visible;
            }

            #printable-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
                transform: scale(1) !important;
            }

            .paper {
                box-shadow: none !important;
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <div id="printable-area">
        <!-- The form sends its entire output payload here -->
    </div>

    <script>
        window.addEventListener('message', function (e) {
            const data = e.data;
            if (!data) return;

            if (data.action === 'render') {
                const payload = data.data;
                if (payload.html) {
                    document.getElementById('printable-area').innerHTML = payload.html;
                }
            } else if (data.action === 'print') {
                window.print();
            } else if (data.action === 'setPrintPreview') {
                if (data.data && data.data.html) {
                    document.getElementById('printable-area').innerHTML = data.data.html;
                }
            }
        });
    </script>
</body>

</html>
