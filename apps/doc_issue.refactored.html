    <script src="../js/config.js"></script>
    <script type="module">
        import { DocEngine } from './doc_issue/engine.js';
        const API_URL = `${(typeof window !== 'undefined' ? window.location.origin : 'http://localhost')}/api/auth`;

        const engine = new DocEngine('dynamic-form-container', 'dynamic-preview-container');
        window.engine = engine; // Expose for non-module calls if needed

        window.onload = function () {
            const userStr = sessionStorage.getItem('jc_user');
            engine.init(userStr ? JSON.parse(userStr) : null);

            // Initial Load
            engine.loadDocument('voucher');

            window.addEventListener('resize', adjustPreviewScale);
            adjustPreviewScale();
        };

        window.switchMainTab = function (mode) {
            document.querySelectorAll('.main-tabs .tab').forEach(t => t.classList.remove('active'));
            if (mode === 'write') {
                document.querySelectorAll('.main-tabs .tab')[0].classList.add('active');
                document.getElementById('mode-write').style.display = 'block';
                document.getElementById('mode-history').style.display = 'none';
            } else {
                document.querySelectorAll('.main-tabs .tab')[1].classList.add('active');
                document.getElementById('mode-write').style.display = 'none';
                document.getElementById('mode-history').style.display = 'flex';
                loadHistory();
            }
        }

        window.switchSubTab = function (type) {
            if (window.isReadOnly && type !== engine.currentDoc.id) {
                if (!confirm('??�눧紐꾧퐣�몴??臾믨쉐?�꼷�뻻野껋쥙�뮸?�뜃�돱?')) return;
                resetForm();
            }
            document.querySelectorAll('.sub-tabs .tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.sub-tabs .tab[data-sub="${type}"]`).classList.add('active');

            engine.loadDocument(type).then(() => {
                adjustPreviewScale();
                // Re-apply common data bindings to engine as loadDocument resets data
                // Only needs to carry over issuer/date if we want persistance, but engine handles common data separately?
                // Actually, engine.loadDocument resets 'data' but commonData is separate in engine class.
                // We need to re-bind inputs? No, common inputs are static in HTML.
                // Update preview to reflect common data immediately
                engine.updatePreview();
            });
        }

        window.saveAndPrint = function () {
            const content = engine.collectData();
            const type = engine.currentDoc.id;
            // Target name inference
            const target_name = content.v_name || content.c_name || '?���已�?�냱�벉';

            document.getElementById('btnSave').style.display = 'none';
            document.getElementById('saveSpinner').style.display = 'flex';

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'save_issued_doc', type, target_name, content, issuer: content.issuer })
            })
                .then(res => res.json())
                .then(json => {
                    document.getElementById('btnSave').style.display = 'flex';
                    document.getElementById('saveSpinner').style.display = 'none';
                    if (json.result === 'success') {
                        const docId = json.id;
                        engine.updatePreview(docId);
                        loadHistory();
                        setTimeout(() => window.print(), 500);
                    } else { alert('?�끇履�: ' + json.message); }
                })
                .catch(err => alert(err));
        }

        window.printDoc = function () { window.print(); }

        window.resetForm = function () {
            window.isReadOnly = false;
            document.getElementById('readOnlyBanner').style.display = 'none';
            document.getElementById('btnSave').style.display = 'flex';
            document.getElementById('btnPrintOnly').style.display = 'none';

            // Reload current doc fresh
            engine.loadDocument(engine.currentDoc.id);
        }

        // History Functions (Legacy adapted)
        function loadHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '<div style="padding:20px; text-align:center;"><i class="fas fa-spinner fa-spin"></i> 嚥≪뮆逾� 餓�?..</div>';
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_issued_docs' }) })
                .then(res => res.json())
                .then(json => {
                    container.innerHTML = '';
                    if (!json.list || json.list.length === 0) {
                        container.innerHTML = '<div class="history-item">獄쏆뮄�닋 ?�똻肉�???�냱�뮸?�뜄�뼄.</div>';
                        return;
                    }
                    json.list.forEach(item => {
                        const badge = item.type === 'voucher' ? '<span class="badge badge-blue">?�꼶��??/span>' : '<span class="badge badge-green">?類ㅼ뵥??/span>';
                        const div = document.createElement('div');
                        div.className = 'history-item';
                        div.innerHTML = `
                   <div class="history-info"><h4>${item.target_name} ${badge}</h4><p>${item.issuer}</p></div>
                   <div class="history-meta"><p>${item.created_at}</p></div>`;
                        div.onclick = () => loadDetail(item.id);
                        container.appendChild(div);
                    });
                });
        }

        function loadDetail(id) {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_issued_doc_detail', id }) })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        window.isReadOnly = true;
                        document.getElementById('readOnlyBanner').style.display = 'flex';
                        document.getElementById('btnSave').style.display = 'none';
                        document.getElementById('btnPrintOnly').style.display = 'flex';

                        switchMainTab('write');
                        // Switch tab visual
                        document.querySelectorAll('.sub-tabs .tab').forEach(t => t.classList.remove('active'));
                        document.querySelector(`.sub-tabs .tab[data-sub="${json.doc.type}"]`).classList.add('active');

                        engine.loadDocument(json.doc.type).then(() => {
                            engine.fillForm(JSON.parse(json.doc.content_json));
                            engine.updatePreview(json.doc.id);
                        });
                    }
                });
        }

        function adjustPreviewScale() {
            const container = document.querySelector('.right-panel');
            const paper = document.querySelector('.preview-container');
            if (!container || !paper) return;
            const availableWidth = container.clientWidth - 80;
            const scale = Math.min(1, availableWidth / 794);
            paper.style.transform = `scale(${scale})`;
        }
    </script>
</body>

</html>
