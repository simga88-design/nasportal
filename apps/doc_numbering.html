<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공문 관리 시스템</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Global Styles */
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f1f5f9;
            color: #334155;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            /* App-like feel */
        }

        .wrapper {
            display: flex;
            gap: 20px;
            height: 100%;
            max-width: 1400px;
            margin: 0;
        }

        /* Left Panel: Action Center */
        .left-panel {
            flex: 0 0 430px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Right Panel: Information Hub */
        .right-panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Common Headers */
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Tabs Styling (Inside Left Panel) */
        .action-tabs {
            display: flex;
            padding: 10px 20px 0;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .action-tab {
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .action-tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .action-tab i {
            margin-right: 8px;
        }

        /* Content Areas */
        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #475569;
            font-size: 0.9em;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            border-radius: 6px;
        }

        /* Results */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .result-success {
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }

        /* List Items (Right Panel) */
        .list-controls {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
            display: flex;
            gap: 10px;
        }

        .list-item {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }

        .list-item:hover {
            background: #f8fafc;
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .list-item-title {
            font-weight: 600;
            color: #334155;
        }

        .list-item-meta {
            font-size: 12px;
            color: #94a3b8;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-red {
            background: #fee2e2;
            color: #ef4444;
        }

        .badge-blue {
            background: #dbeafe;
            color: #2563eb;
        }

        .search-bar {
            display: none;
            margin-bottom: 10px;
        }

        .search-bar.active {
            display: flex;
            gap: 5px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        /* Loading Overlay */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #2563eb;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <!-- LEFT PANEL: ACTION CENTER -->
        <div class="left-panel">
            <div class="panel-header">
                <span>🚀 공문 관리 액션</span>
            </div>

            <div class="action-tabs">
                <div class="action-tab active" onclick="switchLeftTab('issue')"><i class="fas fa-pen"></i> 번호발행</div>
                <div class="action-tab" onclick="switchLeftTab('sent')"><i class="fas fa-paper-plane"></i> 발송신고</div>
            </div>

            <div class="panel-content">
                <!-- TAB 1: ISSUE -->
                <div id="view-issue" class="view-section active">
                    <div class="form-group">
                        <label>문서 종류</label>
                        <select id="docType" onchange="toggleFields()">
                            <option value="제정내">제정내 (내부결재)</option>
                            <option value="제정공">제정공 (대외발송)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="title" placeholder="문서 제목을 입력하세요">
                    </div>
                    <div id="field-receiver" class="form-group hidden">
                        <label>수신자</label>
                        <input type="text" id="target_receiver" placeholder="예: 제천시보건소장">
                    </div>
                    <div id="field-category" class="form-group">
                        <label>구분</label>
                        <select id="target_category">
                            <option value="복지">복지</option>
                            <option value="자살">자살</option>
                            <option value="회계">회계</option>
                            <option value="행정">행정</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>기안자</label>
                        <input type="text" id="sender" readonly>
                    </div>
                    <button id="btnIssue" class="btn btn-primary" onclick="issueNumber()">
                        <i class="fas fa-check"></i> 번호 발급 받기
                    </button>
                    <div id="resultIssue" class="result-box result-success"></div>
                </div>

                <!-- TAB 2: SENT REPORT -->
                <div id="view-sent" class="view-section hidden">
                    <div
                        style="background:#fff7ed; padding:15px; border-radius:10px; font-size:14px; color:#c2410c; margin-bottom:20px; border:1px solid #ffedd5;">
                        <i class="fas fa-info-circle"></i> 우측 목록에서 문서를 선택하면 자동 입력됩니다.
                    </div>

                    <div class="form-group">
                        <label>문서 번호 (숫자 또는 공문번호 입력)</label>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <input type="text" id="search_number" placeholder="예: 60 또는 제정공-60" style="flex:1;">
                            <button class="btn btn-secondary btn-sm" onclick="searchDocInfo()">조회</button>
                        </div>
                    </div>

                    <div id="docInfoArea" class="hidden"
                        style="background:#f8fafc; padding:15px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:20px;">
                        <div style="margin-bottom:5px;"><b><i class="fas fa-file-alt"></i> 제목:</b> <span
                                id="info_title"></span></div>
                        <div style="margin-bottom:10px;"><b><i class="fas fa-user"></i> 기안:</b> <span
                                id="info_sender"></span></div>
                        <div id="info_warning" style="color:#ef4444; font-size:13px;"></div>

                        <hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">

                        <label>실제 발송일</label>
                        <input type="date" id="sent_date">
                        <button class="btn btn-success" style="margin-top:10px;" onclick="markAsSent()">
                            <i class="fas fa-paper-plane"></i> 발송 확정
                        </button>
                    </div>
                    <div id="resultSent" class="result-box result-success"></div>
                </div>

            </div>
        </div>

        <!-- RIGHT PANEL: INFO HUB -->
        <div class="right-panel">
            <div class="panel-header">
                <span>📋 문서 목록</span>
                <div id="externalLinks" style="display:none; gap:5px;">
                    <!-- [추가] 관리자용 수정요청 확인 버튼 -->
                </div>
            </div>

            <div class="list-controls" style="gap:5px; flex-wrap: wrap;">
                <button id="tab-pending" class="btn btn-sm btn-primary active" onclick="switchListTab('pending')">⏳
                    미발송</button>
                <button id="tab-jejeonggong" class="btn btn-sm btn-secondary" onclick="switchListTab('제정공')">제정공
                    대장</button>
                <button id="tab-jejeongnae" class="btn btn-sm btn-secondary" onclick="switchListTab('제정내')">제정내
                    대장</button>

                <!-- Excel Export Container (Right Aligned via flex) -->
                <div style="flex: 1; text-align: right; display: flex; justify-content: flex-end; align-items: center; gap: 5px;"
                    id="export-controls" class="hidden">
                    <button class="btn btn-sm btn-success" id="btn-export-excel" onclick="exportToExcel()">
                        <i class="fas fa-file-excel"></i> 엑셀 다운로드
                    </button>
                </div>
            </div>

            <div id="rightListContainer" class="panel-content" style="padding:0;">
                <!-- List Items will act here -->
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i> 데이터 로딩 중...
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        // 의뢰서 접수용 URL (Case Management Data)
        const DATA_API_URL = BASE_URL; // from config.js

        // 공문채번 시스템 URL (Numbering)
        const NUMBERING_API_URL = BASE_URL; // from config.js

        // 기존 코드와의 호환성을 위해 매핑
        const SCRIPT_URL = NUMBERING_API_URL; // [주의] 이 파일은 '공문채번'이 주 목적이므로 NUMBERING_URL이 기본
        const DATA_URL = DATA_API_URL;

        // Globals
        let currentUser = "";
        let currentUserRole = "";
        let isSystemAdmin = false;

        // Init
        window.onload = function () {
            // Load User
            const userStr = sessionStorage.getItem('jc_user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    currentUser = user.name || "";
                    currentUserRole = user.role || "";
                    isSystemAdmin = user.isSystemAdmin || false;
                    document.getElementById('sender').value = currentUser;

                    // Check Admin Role
                    if (['관리자', '센터장', '시스템관리자'].includes(user.role) || isSystemAdmin) {
                        document.getElementById('externalLinks').style.display = 'flex';
                        const btnAdmin = document.getElementById('btnAdminView');
                        if (btnAdmin) btnAdmin.style.display = 'inline-flex';
                    }
                } catch (e) { }
            }

            // Initial Load
            switchListTab('pending');

            // Initial Tab
            switchLeftTab('issue');
        };

        // --- UI Logic ---

        function switchLeftTab(tabName) {
            document.querySelectorAll('.action-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));

            // Find Index
            const tabIndex = { 'issue': 0, 'sent': 1 }[tabName];
            if (tabIndex !== undefined) {
                document.querySelectorAll('.action-tab')[tabIndex].classList.add('active');
                document.getElementById('view-' + tabName).classList.remove('hidden');
            }

            // Special Init
            if (tabName === 'sent') {
                document.getElementById('sent_date').value = new Date().toISOString().substring(0, 10);
            }
        }

        let currentListMode = 'pending';

        function switchListTab(mode) {
            currentListMode = mode;
            // Update Tab UI
            ['pending', 'jejeonggong', 'jejeongnae'].forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (!btn) return;
                
                let targetKey = 'pending';
                if (mode === '제정공') targetKey = 'jejeonggong';
                if (mode === '제정내') targetKey = 'jejeongnae';

                if (key === targetKey) {
                    btn.classList.remove('btn-secondary');
                    btn.classList.add('btn-primary', 'active');
                } else {
                    btn.classList.remove('btn-primary', 'active');
                    btn.classList.add('btn-secondary');
                }
            });

            // Toggle Export Controls visibility
            const exportControls = document.getElementById('export-controls');
            if (mode === '제정공' || mode === '제정내') {
                exportControls.classList.remove('hidden');
            } else {
                exportControls.classList.add('hidden');
            }

            if (mode === 'pending') {
                loadPendingDocs();
            } else {
                loadLedger(mode);
            }
        }

        function toggleFields() {
            const type = document.getElementById('docType').value;
            if (type === '제정내') {
                document.getElementById('field-receiver').classList.add('hidden');
                document.getElementById('field-category').classList.remove('hidden');
            } else {
                document.getElementById('field-receiver').classList.remove('hidden');
                document.getElementById('field-category').classList.add('hidden');
            }
        }

        // --- Data Logic: List (Right Panel) ---

        function loadPendingDocs() {
            const container = document.getElementById('rightListContainer');
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div>';

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "get_pending_list" }) })
                .then(res => res.json())
                .then(json => {
                    const list = json.list || [];
                    if (!list || list.length === 0) {
                        container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="color:#10b981"></i> 미발송 내역이 없습니다.</div>';
                        return;
                    }
                    // Forcing rigorous numerical sort on the frontend to absolutely guarantee 94 -> 93 -> 92
                    list.sort((a, b) => {
                        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
                        const getNum = (s) => (s && s.match(/-(\d+)$/) ? parseInt(s.match(/-(\d+)$/)[1], 10) : 0);
                        const numA = getNum(a.docNum), numB = getNum(b.docNum);
                        if (numA !== numB) return numB - numA;
                        return (b.docNum || '').localeCompare(a.docNum || '');
                    });
                    renderList(list, 'pending');
                })
                .catch(err => {
                    container.innerHTML = `<div class="empty-state" style="color:red">통신 오류: ${err.message}</div>`;
                });
        }

        function loadLedger(type) {
            const container = document.getElementById('rightListContainer');
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> 검색 중...</div>';

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "get_ledger", docType: type })
            })
                .then(res => res.json())
                .then(json => {
                    const list = json.list || [];
                    if (!list || list.length === 0) {
                        container.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
                        return;
                    }
                    // Forcing rigorous numerical sort on the frontend to absolutely guarantee 94 -> 93 -> 92
                    list.sort((a, b) => {
                        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
                        const getNum = (s) => (s && s.match(/-(\d+)$/) ? parseInt(s.match(/-(\d+)$/)[1], 10) : 0);
                        const numA = getNum(a.docNum), numB = getNum(b.docNum);
                        if (numA !== numB) return numB - numA;
                        return (b.docNum || '').localeCompare(a.docNum || '');
                    });
                    renderList(list, 'ledger');
                })
                .catch(err => {
                    container.innerHTML = `<div class="empty-state" style="color:red">통신 오류: ${err.message}</div>`;
                });
        }

        function renderList(list, type) {
            const container = document.getElementById('rightListContainer');
            let html = '';

            list.forEach(item => {
                const badgeType = type === 'pending' ? 'badge-red' : 'badge-blue';

                html += `
            <div class="list-item" onclick="onItemClick('${item.docNum}', '${item.type || ''}')">
                <div class="list-item-header">
                    <span class="badge ${badgeType}">${item.docNum}</span>
                    <span class="list-item-meta">${item.date}</span>
                </div>
                <div class="list-item-title">${item.title}</div>
                <div class="list-item-meta">
                    <i class="fas fa-user"></i> ${item.sender} &nbsp;|&nbsp; 
                    <i class="fas fa-map-marker-alt"></i> ${item.target || '-'}
                </div>
            </div>
            `;
            });
            container.innerHTML = html;
        }

        function onItemClick(docNum) {
            // Switch to Sent tab (Action Panel)
            switchLeftTab('sent');
            // Pre-fill number
            document.getElementById('search_number').value = docNum;
            // Auto-search
            searchDocInfo();
        }

        // --- Action Logic (Left Panel) ---

        // 1. Issue
        function issueNumber() {
            const title = document.getElementById('title').value;
            const sender = document.getElementById('sender').value;
            if (!title || !sender) { parent.Modal.alert('필수 입력을 확인하세요.'); return; }

            const docType = document.getElementById('docType').value;
            const isInternal = docType === '제정내';
            const target = isInternal ? document.getElementById('target_category').value : document.getElementById('target_receiver').value;

            const payload = { action: "issue", docType, title, sender, target };

            // Send
            btnLoading('btnIssue', true);
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        const box = document.getElementById('resultIssue');
                        box.innerHTML = `✅ 발급완료: ${json.data.message}`;
                        box.style.display = 'block';
                        document.getElementById('title').value = '';
                        // Reload list to show new pending item
                        if (document.getElementById('listViewMode').value === 'pending') loadPendingDocs();
                    } else { parent.Modal.alert(json.message); }
                })
                .finally(() => btnLoading('btnIssue', false, '<i class="fas fa-check"></i> 번호 발급 받기'));
        }

        // 2. Search Doc Info
        function searchDocInfo() {
            const num = document.getElementById('search_number').value;
            if (!num) return;

            const btn = document.querySelector('#view-sent button.btn-secondary'); // The small search button
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "search_doc_info", docNumber: num }) })
                .then(res => res.json())
                .then(json => {
                    const data = json.data || {};
                    if (data.found) {
                        if (data.isValiddocType === false) {
                            parent.Modal.alert('제정공 문서만 검색 및 발송 처리할 수 있습니다.');
                            document.getElementById('docInfoArea').classList.add('hidden');
                            return;
                        }

                        document.getElementById('docInfoArea').classList.remove('hidden');
                        document.getElementById('info_title').innerText = data.title;
                        document.getElementById('info_sender').innerText = data.sender;

                        const warn = document.getElementById('info_warning');
                        if (data.docType === '제정내') {
                            warn.innerHTML = `<i class="fas fa-info-circle"></i> 제정내(내부결재) 문서는 발송 대상이 아닙니다.`;
                            // Hide the date picker and the confirm button correctly
                            document.getElementById('sent_date').style.display = 'none';
                            document.getElementById('sent_date').previousElementSibling.style.display = 'none'; // label
                            document.querySelector('#docInfoArea button.btn-success').style.display = 'none';
                        } else {
                            // Restore visibility for non-제정내
                            document.getElementById('sent_date').style.display = 'inline-block';
                            document.getElementById('sent_date').previousElementSibling.style.display = 'inline-block';
                            document.querySelector('#docInfoArea button.btn-success').style.display = 'inline-block';
                            if (data.sentDate) warn.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 이미 발송됨: ${data.sentDate}`;
                            else warn.innerText = "";
                        }
                    } else {
                        parent.Modal.alert('문서를 찾을 수 없습니다.');
                        document.getElementById('docInfoArea').classList.add('hidden');
                    }
                })
                .finally(() => { btn.innerHTML = originalText; btn.disabled = false; });
        }

        // 3. Mark Sent
        async function markAsSent() {
            const num = document.getElementById('search_number').value;
            const date = document.getElementById('sent_date').value;
            const sender = document.getElementById('info_sender').innerText.trim();

            if (!num) { parent.Modal.alert('문서 번호를 입력하세요.'); return; }

            // Permission Check: Drafter Only (or Admin)
            const isAdmin = ['관리자', '센터장', '시스템관리자'].includes(currentUserRole) || isSystemAdmin;
            if (sender !== currentUser && !isAdmin) {
                parent.Modal.alert(`본인이 기안한 문서만 발송 확정할 수 있습니다.\n(기안자: ${sender})`);
                return;
            }

            if (!await parent.Modal.confirm(`문서번호 [${num}]번 발송 확정 하시겠습니까?`)) return;

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "mark_sent", docNumber: num, sentDate: date })
            })
                .then(res => res.json())
                .then(json => {
                    if (json.result === 'success') {
                        parent.Modal.alert('처리되었습니다.');
                        document.getElementById('docInfoArea').classList.add('hidden');
                        document.getElementById('search_number').value = '';
                        // 목록 갱신이 필요하다면 아래 주석 해제
                        // loadPendingDocs(); 
                    } else {
                        parent.Modal.alert(json.message);
                    }
                });
        }



        // 4. Export to Excel (Worker Triggers)
        async function exportToExcel() {
            if (currentListMode !== '제정공' && currentListMode !== '제정내') return;

            const btn = document.getElementById('btn-export-excel');

            const confirmMsg = `전체 '${currentListMode}' 내역을 엑셀로 다운로드하시겠습니까? (로딩에 다소 시간이 소요될 수 있습니다.)`;

            if (!await parent.Modal.confirm(confirmMsg)) return;

            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';

            try {
                // Determine API URL based on host since it's an absolute Node.js backend route
                const NODE_SERVER = window.location.origin;

                const res = await fetch(`${NODE_SERVER}/api/export_excel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        docType: currentListMode,
                        yearMonth: ''
                    })
                });

                const json = await res.json();
                if (json.result === 'success') {
                    parent.Modal.alert(json.message + `\n(대상건수: ${json.targetCount}건)`);

                    // Trigger download
                    if (json.file) {
                        const dlLink = document.createElement('a');
                        dlLink.href = NODE_SERVER + json.file;
                        // For example: export_제정공_1740445678.xlsx
                        dlLink.download = json.file.split('/').pop();
                        document.body.appendChild(dlLink);
                        dlLink.click();
                        document.body.removeChild(dlLink);
                    }
                } else {
                    parent.Modal.alert("엑셀 생성 실패: " + json.message);
                }
            } catch (e) {
                parent.Modal.alert("통신 오류가 발생했습니다.");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }


        // Utils
        function btnLoading(id, isLoading, originalHtml) {
            const btn = document.getElementById(id);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';
            } else {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

    </script>
